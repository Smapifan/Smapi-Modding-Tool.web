<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stardew Valley Map Editor v1.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ Header ════════════════════════════════════════════════════════════ -->
<header id="header">
  <div class="logo"><span>🌾</span> Stardew Valley Map Editor</div>
  <nav class="menu-bar">
    <button class="menu-btn" id="btn-new"     title="New map">New</button>
    <button class="menu-btn" id="btn-open"    title="Open .tbin file">Open</button>
    <button class="menu-btn" id="btn-save"    title="Save .tbin file">Save</button>
    <button class="menu-btn" id="btn-saveas"  title="Save As …">Save As</button>
    <button class="menu-btn" id="btn-export"  title="Export to JSON">Export JSON</button>
  </nav>
  <div class="header-spacer"></div>
  <span class="version-badge">v1.0.0</span>
</header>

<!-- ═══ Toolbar ═══════════════════════════════════════════════════════════ -->
<div id="toolbar">
  <button class="tool-btn active" id="tool-select"  title="Select (S)" data-tool="select">⬚</button>
  <button class="tool-btn"        id="tool-paint"   title="Paint tile (P)" data-tool="paint">🖌</button>
  <button class="tool-btn"        id="tool-erase"   title="Erase (E)" data-tool="erase">⌫</button>
  <button class="tool-btn"        id="tool-fill"    title="Flood fill (F)" data-tool="fill">🪣</button>
  <button class="tool-btn"        id="tool-eyedrop" title="Eyedropper (I)" data-tool="eyedrop">💧</button>
  <div class="tool-separator"></div>
  <button class="tool-btn"        id="btn-undo"     title="Undo (Ctrl+Z)">↩</button>
  <button class="tool-btn"        id="btn-redo"     title="Redo (Ctrl+Y)">↪</button>
  <div class="tool-separator"></div>
  <button class="tool-btn"        id="btn-zoom-in"  title="Zoom in (+)">＋</button>
  <span   class="zoom-display"    id="zoom-display">100%</span>
  <button class="tool-btn"        id="btn-zoom-out" title="Zoom out (-)">－</button>
  <button class="tool-btn"        id="btn-zoom-fit" title="Fit to window">⊡</button>
  <div class="tool-separator"></div>
  <button class="tool-btn"        id="btn-grid"     title="Toggle grid (G)">⊞</button>
</div>

<!-- ═══ Main ══════════════════════════════════════════════════════════════ -->
<div id="main">

  <!-- ─── Left panel ──────────────────────────────────────────────────── -->
  <aside id="left-panel">

    <!-- Layers -->
    <div class="panel-section" style="height:220px; flex-shrink:0;">
      <div class="panel-header">
        Layers
        <div class="panel-header-actions">
          <button class="icon-btn" id="btn-layer-add"    title="Add layer">＋</button>
          <button class="icon-btn" id="btn-layer-del"    title="Delete layer">🗑</button>
          <button class="icon-btn" id="btn-layer-up"     title="Move layer up">▲</button>
          <button class="icon-btn" id="btn-layer-down"   title="Move layer down">▼</button>
        </div>
      </div>
      <div id="layer-list"></div>
    </div>

    <!-- Tileset selector -->
    <div class="panel-section grow">
      <div class="panel-header">
        Tilesheet
        <div class="panel-header-actions">
          <button class="icon-btn" id="btn-ts-add"  title="Import tilesheet">＋</button>
          <button class="icon-btn" id="btn-ts-del"  title="Remove tilesheet">🗑</button>
        </div>
      </div>
      <div id="tileset-select-row">
        <select id="tileset-select"></select>
      </div>
      <div id="tileset-canvas-wrap">
        <canvas id="tileset-canvas"></canvas>
        <div id="tileset-preview-overlay"></div>
      </div>
    </div>

  </aside>

  <!-- ─── Canvas area ─────────────────────────────────────────────────── -->
  <div id="canvas-area">
    <canvas id="map-canvas"></canvas>
  </div>

  <!-- ─── Right panel ─────────────────────────────────────────────────── -->
  <aside id="right-panel">
    <div class="panel-section grow">
      <div class="panel-header">
        Properties
        <div class="panel-header-actions">
          <button class="icon-btn" id="btn-prop-add" title="Add property">＋</button>
        </div>
      </div>
      <div id="props-list"></div>
    </div>

    <div id="map-info">
      <div><strong>Map:</strong> <span id="info-id">—</span></div>
      <div><strong>Size:</strong> <span id="info-size">—</span></div>
      <div><strong>Layers:</strong> <span id="info-layers">0</span></div>
      <div><strong>Tilesheets:</strong> <span id="info-tsheets">0</span></div>
    </div>
  </aside>

</div>

<!-- ═══ Status bar ════════════════════════════════════════════════════════ -->
<footer id="status-bar">
  <span id="status-msg" class="status-ok">Ready – open a .tbin file or create a new map</span>
  <span style="flex:1"></span>
  <span id="status-cursor">—</span>
  <span id="status-tile">—</span>
  <span id="status-tool">Select</span>
</footer>

<!-- ═══ Modals ════════════════════════════════════════════════════════════ -->

<!-- New Map modal -->
<div class="modal-overlay hidden" id="modal-new">
  <div class="modal">
    <h2>🗺 New Map</h2>
    <label>Map ID</label>
    <input type="text" id="new-map-id" value="NewMap" placeholder="e.g. FarmHouse">
    <label>Description</label>
    <input type="text" id="new-map-desc" value="" placeholder="Optional description">
    <label>Width (tiles)</label>
    <input type="number" id="new-map-w" value="30" min="1" max="512">
    <label>Height (tiles)</label>
    <input type="number" id="new-map-h" value="20" min="1" max="512">
    <label>Tile size (px)</label>
    <input type="number" id="new-tile-size" value="16" min="8" max="128">
    <div class="modal-actions">
      <button class="btn-secondary" id="new-cancel">Cancel</button>
      <button class="btn-primary"   id="new-create">Create</button>
    </div>
  </div>
</div>

<!-- Add Layer modal -->
<div class="modal-overlay hidden" id="modal-add-layer">
  <div class="modal">
    <h2>➕ Add Layer</h2>
    <label>Layer ID</label>
    <input type="text" id="new-layer-id" value="Back" placeholder="e.g. Back, Buildings, Front">
    <label>Description</label>
    <input type="text" id="new-layer-desc" value="" placeholder="Optional">
    <div class="modal-actions">
      <button class="btn-secondary" id="add-layer-cancel">Cancel</button>
      <button class="btn-primary"   id="add-layer-ok">Add</button>
    </div>
  </div>
</div>

<!-- Add Tilesheet modal -->
<div class="modal-overlay hidden" id="modal-add-ts">
  <div class="modal">
    <h2>🖼 Import Tilesheet</h2>
    <label>Tilesheet ID</label>
    <input type="text" id="ts-id" value="spring_outdoors" placeholder="Tilesheet identifier">
    <label>Image file</label>
    <input type="file" id="ts-file" accept="image/*" style="padding:4px 0; border:none; background:transparent; color:var(--text)">
    <label>Tile width (px)</label>
    <input type="number" id="ts-tw" value="16" min="1" max="256">
    <label>Tile height (px)</label>
    <input type="number" id="ts-th" value="16" min="1" max="256">
    <div class="modal-actions">
      <button class="btn-secondary" id="add-ts-cancel">Cancel</button>
      <button class="btn-primary"   id="add-ts-ok">Import</button>
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-open-input"    accept=".tbin" style="display:none">
<input type="file" id="file-import-input"  accept=".json" style="display:none">

<script src="editor.js"></script>
</body>
</html>
